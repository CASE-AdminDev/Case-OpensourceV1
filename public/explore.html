<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — CASE</title>
  <meta name="description" content="Enter a CASE code to view any student's portfolio instantly." />
  <meta name="theme-color" content="#0F172A" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233B82F6'/><text x='50' y='72' font-size='60' font-weight='bold' fill='white' text-anchor='middle' font-family='sans-serif'>C</text></svg>" />

  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </noscript>

  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/explore.css" />
</head>

<body>
  <div class="explore">
    <div class="explore__content">

      <a href="/" class="explore__logo">C<span class="logo-a">A</span>SE</a>

      <h1 class="explore__heading">Enter a CASE Code</h1>
      <p class="explore__subtext">View any student's portfolio instantly</p>

      <div class="explore__input-wrap">
        <input type="text" class="explore__input" id="codeInput" placeholder="e.g. CASE-X7K2P" maxlength="10"
          autocomplete="off" spellcheck="false" />
        <div class="explore__error" id="codeError">Code not found. Check and try again.</div>
      </div>

      <button class="explore__btn" id="viewBtn">
        View Profile
        <span>→</span>
      </button>

      <div class="explore__divider">or share your own CASE</div>

      <a href="/public/auth.html" class="explore__cta-link">Create Your CASE — Free →</a>
    </div>
  </div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

  <script src="js/firebase-env.js"></script>
  <script src="js/firebase-config.js" defer></script>
  <script src="js/data-service.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/explore.js" defer></script>
</body>

</html>
